<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chatbot Demo - Nexus Fit</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ece5dd;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 350px;
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.header {
  background: #075e54;
  color: white;
  padding: 15px;
  text-align: center;
}

.chat-box {
  height: 400px;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.message {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 10px;
  max-width: 70%;
}

.user {
  background: #dcf8c6;
  align-self: flex-end;
}

.bot {
  background: #f1f0f0;
  align-self: flex-start;
}

.input-area {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  background: #075e54;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

button:disabled {
  background: #888;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">Chatbot 🤖</div>

  <div class="chat-box" id="chat"></div>

  <div class="input-area">
    <input type="text" id="input" placeholder="Escribe un mensaje...">
    <button onclick="enviar()">Enviar</button>
  </div>

  <!-- BOTÓN DE WHATSAPP -->
  <button id="whatsappBtn" disabled>Finalizar pedido por WhatsApp</button>
</div>

<script>
// VARIABLES GLOBALES
let estado = "inicio";
let producto = "";
let nombreCliente = "";
let direccionCliente = "";

// FUNCIONES
function agregarMensaje(texto, tipo) {
  let chat = document.getElementById("chat");
  let mensaje = document.createElement("div");
  mensaje.classList.add("message", tipo);
  mensaje.innerText = texto;
  chat.appendChild(mensaje);
  chat.scrollTop = chat.scrollHeight;
}

function responder(msg) {
  msg = msg.toLowerCase();

  if (estado === "inicio") {
    if (msg.includes("hola")) {
      estado = "menu";
      return "💪 Bienvenido a Nexus Fit\n¿Qué deseas comprar?\n1. Creatina\n2. Proteína\n3. Pre-entreno";
    }
  }

  if (estado === "menu") {
    if (msg.includes("1") || msg.includes("creatina")) {
      producto = "Creatina";
      estado = "confirmar";
      return "🔥 Creatina - 120 Bs\n¿Deseas hacer el pedido? (si/no)";
    }
    if (msg.includes("2") || msg.includes("proteina")) {
      producto = "Proteína";
      estado = "confirmar";
      return "🥤 Proteína - 250 Bs\n¿Deseas hacer el pedido? (si/no)";
    }
    if (msg.includes("3") || msg.includes("pre")) {
      producto = "Pre-entreno";
      estado = "confirmar";
      return "⚡ Pre-entreno - 150 Bs\n¿Deseas hacer el pedido? (si/no)";
    }
  }

  if (estado === "confirmar") {
    if (msg.includes("si")) {
      estado = "nombre";
      return "🧾 Perfecto, ¿cuál es tu nombre?";
    } else {
      estado = "inicio";
      return "👌 Escribe 'hola' para volver al menú";
    }
  }

  if (estado === "nombre") {
    nombreCliente = msg;
    estado = "direccion";
    return "📍 Ingresa tu dirección de entrega";
  }

  if (estado === "direccion") {
    direccionCliente = msg;
    estado = "final";
    document.getElementById("whatsappBtn").disabled = false; // habilita el botón
    return `✅ Pedido registrado\n👤 Nombre: ${nombreCliente}\n📦 Producto: ${producto}\n📍 Dirección: ${direccionCliente}\n\nPresiona el botón para finalizar en WhatsApp`;
  }

  return "❌ Escribe 'hola' para comenzar";
}

function enviar() {
  let input = document.getElementById("input");
  let texto = input.value;

  if (texto.trim() === "") return;

  agregarMensaje(texto, "user");

  setTimeout(() => {
    let respuesta = responder(texto);
    agregarMensaje(respuesta, "bot");
  }, 500);

  input.value = "";
}

// BOTÓN WHATSAPP
document.getElementById("whatsappBtn").addEventListener("click", function() {
  let numero = "59173983651"; // tu número
  let mensaje = "Hola, quiero hacer un pedido%0A";
  mensaje += "Producto: " + producto + "%0A";
  mensaje += "Nombre: " + nombreCliente + "%0A";
  mensaje += "Dirección: " + direccionCliente;

  let link = "https://wa.me/" + numero + "?text=" + mensaje;

  window.open(link, "_blank");
});
</script>
</body>
</html>
